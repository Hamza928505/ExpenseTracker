<div class="app-shell">

      <div>
        <div class="logo-text">Expense<span>Tracker</span></div>
        <div class="logo-sub">Personal Finance</div>
      </div>
    </a>

    <nav class="sb-nav d-flex flex-column">

          <span class="et-toggle-track"></span>

      </div>
      <div class="sb-version">ExpenseTracker v2.0</div>
    </div>
  </aside>

  <!-- ════════════════════════════════════════
       MAIN
       ════════════════════════════════════════ -->
  <div class="et-main">

    <!-- ── TOPBAR ── -->
    <div class="et-topbar">
      <div class="topbar-title">Transactions</div>
      <div class="topbar-right">
        <div class="month-pill">
          <button class="mpill-btn" onclick="changeMonth(-1)">&#8592;</button>
          <span class="mpill-label"></span>
          <button class="mpill-btn" onclick="changeMonth(1)">&#8594;</button>
        </div>
        <button class="theme-btn-top" id="themeBtn" onclick="toggleTheme()">🌙</button>
      </div>
    </div>

    <!-- ── PAGE CONTENT ── -->
    <div class="page-wrap flex-grow-1">

      <!-- Header row -->
      <div class="d-flex align-items-center justify-content-between mb-2 mb-sm-3">
        <div class="sec-title">Transactions</div>
        <span class="sec-badge" id="txBadge">0 entries</span>
      </div>

      <!-- ══════════════════════════════════════════════════
           FILTER CHIP BAR
           • Touch devices  : native touch-scroll
           • Desktop/mouse  : click-drag scroll (JS below)
           • Scrollbar hidden on all browsers
           ══════════════════════════════════════════════════ -->
      <div class="filter-scroll-wrap mb-2 mb-sm-3" id="chipBar">
        <div class="filter-chips">
          <button class="chip on" onclick="setFilter('all',this)">All</button>
          <button class="chip"    onclick="setFilter('income',this)">Income</button>
          <button class="chip"    onclick="setFilter('expense',this)">Expense</button>
          <button class="chip"    onclick="setFilter('Salary',this)">💼 Salary</button>
          <button class="chip"    onclick="setFilter('Freelance',this)">💻 Freelance</button>
          <button class="chip"    onclick="setFilter('Investment',this)">📈 Investment</button>
          <button class="chip"    onclick="setFilter('General',this)">☕ General</button>
          <button class="chip"    onclick="setFilter('Food',this)">🍽 Food</button>
          <button class="chip"    onclick="setFilter('Transport',this)">🚗 Transport</button>
          <button class="chip"    onclick="setFilter('Shopping',this)">🛍 Shopping</button>
          <button class="chip"    onclick="setFilter('Health',this)">💊 Health</button>
          <button class="chip"    onclick="setFilter('Bills',this)">⚡ Bills</button>
          <button class="chip"    onclick="setFilter('Entertainment',this)">🎬 Entertainment</button>
          <button class="chip"    onclick="setFilter('Travel',this)">✈️ Travel</button>
          <button class="chip"    onclick="setFilter('Education',this)">📚 Education</button>
          <button class="chip"    onclick="setFilter('Other',this)">💡 Other</button>
        </div>
      </div>

      <!-- ── TRANSACTION LIST — full width at every breakpoint ── -->
      <div class="et-card" id="txList">
        <div class="empty-state">
          <span class="empty-icon">📭</span>
          No transactions yet.<br>Tap + to add one.
        </div>
      </div>

      <div class="pb-4"></div>

  </div><!-- /et-main -->
</div><!-- /app-shell -->

<!-- ════════════════════════════════════════
     BOTTOM NAV  (xs → md)

    <span class="bnav-add-icon">＋</span>

  </button>
  <a href="settings.html"     class="bnav-btn"><span class="bnav-icon">⚙️</span>Settings</a>

<!-- ADD TRANSACTION SHEET -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="sheet" id="addSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">New Transaction</div>
  <div class="sheet-body">
    <div class="type-seg">
      <button class="type-seg-btn sel-inc" id="btnInc" onclick="setType('income')">＋ Income</button>
      <button class="type-seg-btn"         id="btnExp" onclick="setType('expense')">－ Expense</button>
    </div>
    <div>
      <label class="et-label">Amount</label>
      <input class="et-input big" id="fAmt" type="number" min="0.01" step="0.01" placeholder="0.00" inputmode="decimal"/>
    </div>
    <div>
      <label class="et-label">Description (optional)</label>
      <input class="et-input" id="fDesc" type="text" placeholder="What was this for?"/>
    </div>
    <div>
      <label class="et-label">Category</label>
      <select class="et-select" id="fCat"></select>
    </div>
    <div>
      <label class="et-label">Date</label>
      <input class="et-input" id="fDate" type="date"/>
    </div>
    <button class="et-btn-accent" onclick="addTx()">Add Transaction</button>
  </div>
</div>

<script src="shared.js"></script>
<script src="transactions.js"></script>
<script>
  /* ── Mouse-drag scroll for the filter chip bar ── */
  (function () {
    const bar = document.getElementById('chipBar');
    let isDown = false, startX = 0, scrollLeft = 0;

    bar.addEventListener('mousedown', e => {
      isDown    = true;
      startX    = e.pageX - bar.offsetLeft;
      scrollLeft= bar.scrollLeft;
      bar.style.cursor = 'grabbing';
      bar.style.userSelect = 'none';
    });

    bar.addEventListener('mouseleave', () => {
      isDown = false;
      bar.style.cursor = 'grab';
    });

    bar.addEventListener('mouseup', e => {
      isDown = false;
      bar.style.cursor = 'grab';
      bar.style.removeProperty('user-select');
      /* If we barely moved, treat it as a click (chip selection) */
      const moved = Math.abs(e.pageX - bar.offsetLeft - startX);
      if (moved > 5) e.stopPropagation();
    });

    bar.addEventListener('mousemove', e => {
      if (!isDown) return;
      e.preventDefault();
      const x    = e.pageX - bar.offsetLeft;
      const walk = (x - startX) * 1.4;   /* 1.4× speed multiplier */
      bar.scrollLeft = scrollLeft - walk;
    });

    /* Show grab cursor on desktop */
    bar.style.cursor = 'grab';
  })();
</script>
